# One-off probe: does the macos-26 arm64 runner's paravirtual GPU satisfy the
# project's Metal needs -- including backenddiff's bit-for-bit (tolerance 0)
# RGBA16Float store-rounding match against the CPU backend?  Run this manually
# once; if it's green, flip gate.yml from workflow_dispatch to push/pull_request.
#
# macos-26 is the only image with Apple clang 21 (-fbounds-safety, #embed):
# Xcode 26.4 is the first to bundle it.  DEVELOPER_DIR pins Xcode 26.5 to match
# the local toolchain exactly (clang-2100.1.1.101); the image default (26.4.1)
# is one toolchain revision behind.
name: metal-probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app
    steps:
      - uses: actions/checkout@v4
      - name: Does the VM expose a Metal device?
        run: swift -e 'import Metal; print(MTLCreateSystemDefaultDevice()?.name ?? "NO METAL")'
      - name: Font inventory (the gallery-reproducibility question)
        # Compare against a local `shasum -a 256` of the same files: preinstalled
        # fonts are only a fixed point for the text scenes if their *bytes* match
        # across OS versions.  Also name the face Core Text actually substitutes
        # for the absent download-on-demand Libian TC.
        run: |
          sw_vers
          shasum -a 256 /System/Library/Fonts/Helvetica.ttc '/System/Library/Fonts/Apple Color Emoji.ttc' || true
          swift -e 'import CoreText; let f = CTFontCreateWithName("LibianTC-Regular" as CFString, 24, nil); print("LibianTC-Regular resolves to:", CTFontCopyPostScriptName(f))'
      - run: clang --version && ninja --version
      - run: python3 configure.py
      - name: Build both backends, diff bit-for-bit at tolerance 0
        run: ninja backenddiff
