# The full gate: a bare `ninja` builds every variant and runs the whole suite --
# tests in the two checked variants, the gallery re-render, static analysis,
# leakcheck, the OOM fault-injection sweep, and the fuzz corpus replay.  No brew
# installs needed: ninja is preinstalled on macos-26 and the corpus gate uses Apple
# clang.
#
# DEVELOPER_DIR pins Xcode 26.5 = Apple clang 21 (clang-2100.1.1.101), matching
# the toolchain the committed gallery PNGs were rendered with -- the trailing
# git-diff step fails if CI's codegen draws even one different pixel.
name: gate
on:
  push:
    branches: [main]
  pull_request:
jobs:
  gate:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app
    steps:
      - uses: actions/checkout@v5
      - run: clang --version && ninja --version
      - run: python3 configure.py
      - run: ninja
      - name: Text-free gallery scenes must re-render byte-identical
        # Text-bearing scenes depend on the host's font library: Libian TC is
        # an Apple download-on-demand font (it lives in the AssetsV2 asset
        # store once fetched, not /System/Library/Fonts), so a fresh runner VM
        # doesn't have it and Core Text silently substitutes a fallback face --
        # the first gate run re-rendered 19 of 30 scenes differently, exactly
        # the text-drawing ones.  This step gates codegen reproducibility, so
        # it checks the scenes whose every byte is ours.  Keep the list in
        # sync: a new text-free gallery scene belongs here.
        run: >
          git diff --exit-code --
          gallery/batch.png gallery/clip.png gallery/dashes.png
          gallery/gradients.png gallery/imagedata.png gallery/joins.png
          gallery/paths.png gallery/roundrect.png gallery/shapes.png
          gallery/winding.png
      - name: Committed gallery programs must replay byte-identical, fontless
        # The "second half" of the determinism gate.  Inside `ninja` above,
        # test_replay_gallery runs AFTER run_gallery (an order-only edge in
        # configure.py), so that pass proves record->replay lockstep against
        # THIS runner's own re-render -- its fallback fonts, not the committed
        # bytes.  This step re-proves the half that needs a second machine:
        # restore the committed gallery bytes and replay again.  Programs
        # recorded on a machine WITH Libian TC must reproduce the committed
        # PNGs byte-for-byte on this runner, which lacks it -- the embedded
        # font/glyph/bitmap/shape blocks are the only way.  Runs after the
        # text-free diff above, which must see the runner's re-render, not
        # the restored bytes.
        run: |
          git restore gallery/
          ./build/release/test_replay_gallery
          ./build/debug/test_replay_gallery
