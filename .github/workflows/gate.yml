# The full gate: a bare `ninja` builds every variant and runs the whole suite --
# tests in four checked variants against both compositor backends, the gallery
# re-render, static analysis, leakcheck, backenddiff (bit-for-bit, tolerance 0),
# the OOM fault-injection sweep, and the fuzz corpus replay.  No brew installs
# needed: ninja is preinstalled on macos-26 and the corpus gate uses Apple clang.
#
# metal-probe.yml settled the one empirically unverified assumption (run
# 27244925568): the runner's "Apple Paravirtual device" passes backenddiff
# bit-for-bit at tolerance 0, so the full gate runs on every push and PR.
#
# DEVELOPER_DIR pins Xcode 26.5 = Apple clang 21 (clang-2100.1.1.101), matching
# the toolchain the committed gallery PNGs were rendered with -- the trailing
# git-diff step fails if CI's codegen draws even one different pixel.
name: gate
on:
  push:
    branches: [main]
  pull_request:
jobs:
  gate:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app
    steps:
      - uses: actions/checkout@v4
      - run: clang --version && ninja --version
      - run: python3 configure.py
      - run: ninja
      - name: Committed gallery PNGs must re-render byte-identical
        run: git diff --exit-code -- gallery
